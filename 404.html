<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#11120f">
  <title>404 | Juan Manuel Camara Diaz</title>
  <link rel="icon" href="/resources/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/404.js" defer></script>
</head>
<body class="error-page">
  <main>
    <div class="error-toolbar">
      <a class="brand-mark" href="/" aria-label="JM, Juan Manuel Camara Diaz"><span aria-hidden="true">JM</span></a>
      <div class="language-switcher" role="group" aria-label="Cambiar idioma" data-error-language>
        <button type="button" data-error-lang="es" aria-pressed="true">ES</button>
        <button type="button" data-error-lang="ca" aria-pressed="false">CA</button>
        <button type="button" data-error-lang="en" aria-pressed="false">EN</button>
      </div>
    </div>
    <p class="error-code">404</p>
    <h1 data-error-title>Página no encontrada.</h1>
    <div class="error-copy">
      <p data-error-body>La dirección no existe o ha cambiado.</p>
    </div>
    <a class="button button--primary" href="/" data-error-home><span data-error-cta>Volver al inicio</span><span aria-hidden="true">↗</span></a>
  </main>
</body>
</html>
